<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shinobi</title>
<style>
  :root {
    --bg: #0e1014;
    --bg-elev: #161a21;
    --bg-elev-2: #1d222b;
    --border: #262c37;
    --text: #e6e8ec;
    --text-dim: #8a93a3;
    --accent: #7aa2ff;
    --accent-bg: #1f2942;
    --user-bg: #2a3f6b;
    --user-text: #e8efff;
    --agent-bg: #1d222b;
    --agent-text: #e6e8ec;
    --tool-bg: #2b2540;
    --tool-text: #c8b6ff;
    --error: #ff7b7b;
    --ok: #7eff9c;
    --thinking: #6f7990;
    --mono: ui-monospace, SFMono-Regular, Consolas, "Cascadia Mono", "Liberation Mono", Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* StatusLine */
  .status-line {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 16px;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .status-line .brand {
    color: var(--text);
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .status-line .item { display: flex; align-items: center; gap: 6px; }
  .status-line .item .label { color: var(--text-dim); }
  .status-line .item .value { color: var(--text); font-family: var(--mono); }
  .status-line .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-dim);
  }
  .status-line .dot.online { background: var(--ok); }
  .status-line .dot.offline { background: var(--error); }
  .status-line .spacer { flex: 1; }
  .toggle-btn {
    background: var(--bg-elev-2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--sans);
  }
  .toggle-btn:hover { color: var(--text); border-color: var(--accent); }
  .toggle-btn.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }

  /* Chat area */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .chat::-webkit-scrollbar { width: 8px; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .chat::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  .row { display: flex; }
  .row.user { justify-content: flex-end; }
  .row.agent, .row.system { justify-content: flex-start; }

  .bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
    font-family: var(--sans);
  }
  .bubble code, .bubble pre {
    font-family: var(--mono);
    background: rgba(0,0,0,0.25);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 12.5px;
  }
  .bubble pre {
    display: block;
    padding: 10px 12px;
    overflow-x: auto;
    margin: 8px 0;
    white-space: pre;
  }
  .row.user .bubble { background: var(--user-bg); color: var(--user-text); border-bottom-right-radius: 4px; }
  .row.agent .bubble { background: var(--agent-bg); color: var(--agent-text); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
  .row.system .bubble {
    background: transparent;
    color: var(--text-dim);
    font-style: italic;
    font-size: 12.5px;
    max-width: 100%;
    border: 1px dashed var(--border);
  }

  .agent-wrap { display: flex; flex-direction: column; gap: 6px; max-width: 75%; }
  .row.agent .agent-wrap { align-items: flex-start; }
  .row.agent .bubble { max-width: 100%; }

  .tool-chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .tool-chip {
    background: var(--tool-bg);
    color: var(--tool-text);
    font-family: var(--mono);
    font-size: 11.5px;
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .tool-chip::before { content: "🔨 "; }

  .thinking-block {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--thinking);
    max-height: 280px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }
  body:not(.show-thinking) .thinking-block { display: none; }

  .typing-indicator {
    color: var(--text-dim);
    font-style: italic;
    font-size: 12px;
    padding: 4px 0;
  }
  .typing-indicator::after {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    margin-left: 4px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

  /* Input area */
  .input-area {
    flex-shrink: 0;
    padding: 12px 16px 16px;
    background: var(--bg-elev);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-area textarea {
    flex: 1;
    background: var(--bg-elev-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.4;
    resize: none;
    min-height: 42px;
    max-height: 200px;
    outline: none;
  }
  .input-area textarea:focus { border-color: var(--accent); }
  .input-area textarea::placeholder { color: var(--text-dim); }
  .input-area .send-btn {
    background: var(--accent);
    color: #0a0e16;
    border: none;
    border-radius: 10px;
    padding: 0 18px;
    height: 42px;
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
    font-family: var(--sans);
  }
  .input-area .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .input-area .send-btn:not(:disabled):hover { filter: brightness(1.1); }
  .input-area .hint {
    color: var(--text-dim);
    font-size: 11px;
    margin-top: 4px;
  }

  /* Modal for /apply confirmation prompts */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    max-width: 480px;
    width: 90%;
  }
  .modal h3 { margin: 0 0 8px; font-size: 14px; color: var(--text); }
  .modal .question {
    color: var(--text-dim);
    margin-bottom: 14px;
    font-family: var(--mono);
    font-size: 12.5px;
    white-space: pre-wrap;
  }
  .modal input {
    width: 100%;
    background: var(--bg-elev-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
  .modal button {
    background: var(--accent);
    color: #0a0e16;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    font-weight: 600;
    font-size: 12.5px;
  }
  .modal button.secondary {
    background: var(--bg-elev-2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  /* Skill toast — Bloque 3 */
  .skill-toast {
    position: fixed;
    right: 20px;
    bottom: 80px;
    background: var(--bg-elev-2);
    color: var(--text);
    border: 1px solid var(--accent);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12.5px;
    font-family: var(--sans);
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    z-index: 50;
    max-width: 360px;
    transition: opacity 0.5s, transform 0.5s;
  }
  .skill-toast.fade-out { opacity: 0; transform: translateY(10px); }
</style>
</head>
<body class="show-thinking">
  <div class="status-line">
    <span class="brand">SHINOBI</span>
    <span class="item"><span class="label">model</span><span class="value" id="st-model">—</span></span>
    <span class="item"><span class="label">mode</span><span class="value" id="st-mode">—</span></span>
    <span class="item"><span class="dot" id="st-dot"></span><span class="value" id="st-kernel">kernel ?</span></span>
    <span class="item"><span class="label">tokens</span><span class="value" id="st-tokens">—</span></span>
    <span class="item"><span class="label">cost</span><span class="value" id="st-cost">—</span></span>
    <span class="spacer"></span>
    <button id="thinking-toggle" class="toggle-btn active">💭 Thinking</button>
    <button id="reset-session" class="toggle-btn" title="Empezar conversación nueva">↻ New</button>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <textarea id="composer" placeholder="Escribe tu orden o un comando /slash..." rows="1" autofocus></textarea>
    <button id="send" class="send-btn">Send</button>
  </div>

  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
      <h3>Shinobi pregunta</h3>
      <div class="question" id="modal-question"></div>
      <input id="modal-input" type="text" autocomplete="off">
      <div class="actions">
        <button class="secondary" id="modal-cancel">Cancelar</button>
        <button id="modal-ok">Responder</button>
      </div>
    </div>
  </div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const chat = $('chat');
  const composer = $('composer');
  const sendBtn = $('send');
  const stModel = $('st-model');
  const stMode = $('st-mode');
  const stDot = $('st-dot');
  const stKernel = $('st-kernel');
  const stTokens = $('st-tokens');
  const stCost = $('st-cost');
  const thinkingToggle = $('thinking-toggle');
  const resetBtn = $('reset-session');
  const modalBackdrop = $('modal-backdrop');
  const modalQuestion = $('modal-question');
  const modalInput = $('modal-input');
  const modalOk = $('modal-ok');
  const modalCancel = $('modal-cancel');

  // Session id persisted in localStorage so reloads keep history.
  const SESSION_KEY = 'shinobi.sessionId';
  let sessionId = localStorage.getItem(SESSION_KEY);
  if (!sessionId) {
    sessionId = 'web-' + (crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random().toString(36).slice(2));
    localStorage.setItem(SESSION_KEY, sessionId);
  }

  // Tracks the in-progress agent bubble while thinking events stream in.
  let pending = null; // { row, bubble, thinkingBlock, toolChips, lines:[], tools:Set, typing }
  let ws = null;
  let pendingAsk = null;

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function appendUser(text) {
    const row = document.createElement('div');
    row.className = 'row user';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    row.appendChild(bubble);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }

  function appendSystem(text) {
    const row = document.createElement('div');
    row.className = 'row system';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    row.appendChild(bubble);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }

  function startAgent() {
    const row = document.createElement('div');
    row.className = 'row agent';

    const wrap = document.createElement('div');
    wrap.className = 'agent-wrap';

    const toolChips = document.createElement('div');
    toolChips.className = 'tool-chips';
    wrap.appendChild(toolChips);

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    const typing = document.createElement('span');
    typing.className = 'typing-indicator';
    typing.textContent = 'Shinobi está pensando…';
    bubble.appendChild(typing);
    wrap.appendChild(bubble);

    const thinkingBlock = document.createElement('div');
    thinkingBlock.className = 'thinking-block';
    thinkingBlock.textContent = '';
    wrap.appendChild(thinkingBlock);

    row.appendChild(wrap);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;

    pending = { row, bubble, thinkingBlock, toolChips, typing, lines: [], tools: new Set() };
  }

  function appendThinkingLine(line) {
    if (!pending) startAgent();
    pending.lines.push(line);
    pending.thinkingBlock.textContent = pending.lines.join('\n');
    pending.thinkingBlock.scrollTop = pending.thinkingBlock.scrollHeight;
  }

  function appendToolCall(name) {
    if (!pending) startAgent();
    if (pending.tools.has(name)) return;
    pending.tools.add(name);
    const chip = document.createElement('span');
    chip.className = 'tool-chip';
    chip.textContent = name;
    pending.toolChips.appendChild(chip);
  }

  function finalizeAgent(response) {
    if (!pending) startAgent();
    pending.bubble.innerHTML = '';
    pending.bubble.textContent = response || '(respuesta vacía)';
    if (pending.lines.length === 0) {
      pending.thinkingBlock.remove();
    }
    pending = null;
    chat.scrollTop = chat.scrollHeight;
  }

  function appendErrorOnPending(message) {
    if (!pending) {
      appendSystem('[error] ' + message);
      return;
    }
    pending.bubble.innerHTML = '';
    pending.bubble.textContent = '[error] ' + message;
    pending.bubble.style.color = 'var(--error)';
    pending = null;
  }

  function renderHistoryRow(m) {
    if (m.role === 'user') {
      appendUser(m.content);
      return;
    }
    if (m.role === 'system') {
      appendSystem(m.content);
      return;
    }
    // agent
    const row = document.createElement('div');
    row.className = 'row agent';
    const wrap = document.createElement('div');
    wrap.className = 'agent-wrap';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = m.content;
    wrap.appendChild(bubble);

    if (m.thinking && m.thinking.length) {
      const tb = document.createElement('div');
      tb.className = 'thinking-block';
      tb.textContent = m.thinking.join('\n');
      wrap.appendChild(tb);
    }
    row.appendChild(wrap);
    chat.appendChild(row);
  }

  async function loadHistory() {
    try {
      const r = await fetch('/api/history?session=' + encodeURIComponent(sessionId));
      const data = await r.json();
      for (const m of (data.messages || [])) renderHistoryRow(m);
      chat.scrollTop = chat.scrollHeight;
    } catch (e) {
      // ignore
    }
  }

  async function refreshStatus() {
    try {
      const r = await fetch('/api/status');
      const data = await r.json();
      stModel.textContent = data.model || '—';
      stMode.textContent = data.mode || '—';
      stKernel.textContent = data.kernelOnline ? 'kernel online' : 'kernel offline';
      stDot.className = 'dot ' + (data.kernelOnline ? 'online' : 'offline');
    } catch (e) {
      stKernel.textContent = 'kernel ?';
      stDot.className = 'dot';
    }
  }

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/ws');
    ws.addEventListener('open', () => {
      sendBtn.disabled = false;
    });
    ws.addEventListener('close', () => {
      sendBtn.disabled = true;
      setTimeout(connect, 1500); // auto-reconnect
    });
    ws.addEventListener('message', (ev) => {
      let msg;
      try { msg = JSON.parse(ev.data); } catch { return; }
      if (msg.type === 'thinking_start') {
        startAgent();
        return;
      }
      if (msg.type === 'thinking') {
        appendThinkingLine(msg.line);
        return;
      }
      if (msg.type === 'tool_call') {
        appendToolCall(msg.name);
        return;
      }
      if (msg.type === 'final') {
        // Refresh status after a successful turn (mode/model may have changed).
        refreshStatus();
        finalizeAgent(msg.response);
        return;
      }
      if (msg.type === 'error') {
        appendErrorOnPending(msg.message);
        return;
      }
      if (msg.type === 'ask') {
        openAsk(msg.question, msg.requestId);
        return;
      }
      if (msg.type === 'skill_event' && msg.event) {
        showSkillToast(msg.event);
        return;
      }
      if (msg.type === 'document_event' && msg.event) {
        console.log('[auto-offer] UI received document_event:', msg.event.type, msg.event); // DIAG temporal
        showDocumentToast(msg.event);
        return;
      }
    });
  }

  function showDocumentToast(event) {
    const t = document.createElement('div');
    t.className = 'skill-toast';
    if (event.type === 'document_generated' && event.doc) {
      const d = event.doc;
      const sizeKb = Math.round(d.bytes / 1024);
      t.innerHTML =
        '📄 Documento ' + escapeHtml(d.type) + ' generado: <strong>' + escapeHtml(d.title) + '</strong>' +
        ' (' + sizeKb + ' KB)<br><span style="color:var(--text-dim); font-size:11px;">' + escapeHtml(d.path) + '</span>';
    } else if (event.type === 'document_offer') {
      t.textContent = '💡 ' + (event.hint || 'Esta respuesta tiene formato. Usa /doc auto "<descripción>".');
    } else {
      t.textContent = JSON.stringify(event);
    }
    document.body.appendChild(t);
    setTimeout(() => { t.classList.add('fade-out'); setTimeout(() => t.remove(), 600); }, 12000);
  }

  function showSkillToast(event) {
    const t = document.createElement('div');
    t.className = 'skill-toast';
    let label = '';
    if (event.type === 'skill_proposed') label = `💡 Nueva skill propuesta: ${event.name || event.id}. Usa /skill review`;
    else if (event.type === 'skill_approved') label = `✓ Skill aprobada: ${event.name || event.id}`;
    else if (event.type === 'skill_rejected') label = `✗ Skill descartada: ${event.id}`;
    else label = JSON.stringify(event);
    t.textContent = label;
    document.body.appendChild(t);
    setTimeout(() => { t.classList.add('fade-out'); setTimeout(() => t.remove(), 600); }, 8000);
  }

  function openAsk(q, requestId) {
    pendingAsk = requestId;
    modalQuestion.textContent = q;
    modalInput.value = '';
    modalBackdrop.classList.add('show');
    setTimeout(() => modalInput.focus(), 50);
  }
  function closeAsk(reply) {
    if (!pendingAsk) return;
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'ask_response', text: reply, requestId: pendingAsk }));
    }
    pendingAsk = null;
    modalBackdrop.classList.remove('show');
  }
  modalOk.addEventListener('click', () => closeAsk(modalInput.value));
  modalCancel.addEventListener('click', () => closeAsk(''));
  modalInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); closeAsk(modalInput.value); }
    if (e.key === 'Escape') { e.preventDefault(); closeAsk(''); }
  });

  function sendMessage() {
    const text = composer.value;
    if (!text.trim()) return;
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    appendUser(text);
    ws.send(JSON.stringify({ type: 'send', text, sessionId }));
    composer.value = '';
    autoResize();
  }

  function autoResize() {
    composer.style.height = 'auto';
    composer.style.height = Math.min(composer.scrollHeight, 200) + 'px';
  }
  composer.addEventListener('input', autoResize);
  composer.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  sendBtn.addEventListener('click', sendMessage);

  thinkingToggle.addEventListener('click', () => {
    document.body.classList.toggle('show-thinking');
    thinkingToggle.classList.toggle('active', document.body.classList.contains('show-thinking'));
  });

  resetBtn.addEventListener('click', () => {
    if (!confirm('Empezar conversación nueva? El historial actual se conservará pero se ocultará.')) return;
    sessionId = 'web-' + (crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random().toString(36).slice(2));
    localStorage.setItem(SESSION_KEY, sessionId);
    chat.innerHTML = '';
  });

  // Boot
  loadHistory();
  refreshStatus();
  setInterval(refreshStatus, 15000);
  connect();
})();
</script>
</body>
</html>
