name: CI

# Test runner real (Tier A #6) — vitest + tsc en cada push y PR a main.
# Corre en windows-latest porque los tools del Tier S #5 (clipboard, registry,
# process_list, etc.) usan PowerShell nativo y el sandbox de run_command
# valida paths Windows. Otros runners no servirían para validar esos paths.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install --no-audit --no-fund

      # Gate estricto: 0 errores de tipo tolerados. La deuda que justificaba
      # los filtros anteriores se saldó en la auditoría 2026-06-06 (ver
      # DOSSIER_AUDITORIA_2026-06-06.md). Si tsc falla aquí, el merge no pasa.
      - name: Typecheck (estricto, 0 errores)
        run: npx tsc --noEmit

      - name: Vitest
        run: npm test
